appId: ai.opencowork.codesign
productName: Open CoDesign
# Declare the publish target explicitly so electron-builder's updater-info
# machinery (channels, provider, latest.yml) has something non-null to hang
# on — otherwise NSIS packaging crashes with "Cannot read properties of null
# (reading 'provider')" even when we never intend to publish. CI invokes
# electron-builder with `--publish never`, so nothing is actually uploaded.
publish:
  - provider: github
    owner: OpenCoworkAI
    repo: open-codesign
directories:
  buildResources: resources
  output: release
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  artifactName: open-codesign-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch: [arm64, x64]
dmg:
  # Custom window layout guides users to drag the app into /Applications.
  # Running from the DMG mount leaves safeStorage unavailable (the volume
  # is read-only so macOS can't establish a keychain trust entry), which
  # breaks API key save / import. The background, arrow, and in-app boot
  # check (install-check.ts) work together to steer users to the right
  # flow.
  background: build/dmg-background.png
  iconSize: 92
  window:
    width: 640
    height: 480
  contents:
    - x: 140
      y: 240
      type: file
    - x: 500
      y: 240
      type: link
      path: /Applications
win:
  icon: resources/icon.ico
  artifactName: open-codesign-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: resources/icon.png
  # `executableName` controls the binary name AND the deb/rpm package name.
  # Without it electron-builder falls back to `productName` ("Open CoDesign"),
  # which rpmbuild rejects because RPM package names can't contain spaces or
  # uppercase — the fpm invocation `--name Open CoDesign` gets shell-split
  # into two args and the generated spec file ends up at "Open CoDesign.spec"
  # which rpmbuild then refuses to read. Scoped to `linux.` so the macOS
  # `.app` bundle and Windows `.exe` keep their pretty "Open CoDesign" name.
  executableName: open-codesign
  # `maintainer`, `vendor`, `synopsis`, and `description` are REQUIRED metadata
  # for deb/rpm. electron-builder falls back to `author@noreply.github.com` and
  # "Unknown" when they're missing, which causes lintian warnings and gets the
  # package rejected by strict apt mirrors. Values kept in sync with
  # opencowork.ai's other published contacts (security@, conduct@).
  maintainer: Open CoDesign Maintainers <maintainers@opencowork.ai>
  vendor: OpenCoworkAI
  synopsis: Prompt-to-design desktop app for HTML prototypes, decks, and marketing assets.
  # Single-line description: fpm passes it through as a shell arg and some
  # rpmbuild paths choke on embedded newlines even when the arg is quoted.
  description: Open CoDesign turns natural-language prompts into interactive HTML prototypes, PDF-ready slide decks, and marketing assets. Multi-provider model support (Anthropic, OpenAI, Google Gemini, DeepSeek, local Ollama, any OpenAI-compatible endpoint), BYOK, local-first storage, no telemetry.
  # Hardcode `x64` (not ${arch}) because electron-builder substitutes ${arch}
  # differently per Linux target convention (AppImage → x86_64, deb → amd64,
  # rpm → x86_64). SmartDownload.vue + Homebrew cask + Flatpak manifest all
  # reference `-x64.ext`; picking a fixed literal keeps them in sync. We
  # only ship one Linux arch, so this is safe until we add arm64.
  artifactName: open-codesign-${version}-x64.${ext}
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
    # Snap is built in a separate, best-effort CI step (see
    # .github/workflows/release.yml) because snapcraft on ubuntu-latest
    # is heavyweight and occasionally flakes. The target config below is
    # used when that step invokes `electron-builder --linux snap`.
  category: Graphics
snap:
  grade: stable
  confinement: strict
  summary: Prompt → polished HTML prototypes, slide decks, and marketing assets.
